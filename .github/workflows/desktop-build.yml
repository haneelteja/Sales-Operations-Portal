name: Desktop Build & Release

on:
  push:
    branches: [main]
    tags:     ['v*']
  workflow_dispatch:
    inputs:
      publish:
        description: 'Publish release to GitHub Releases?'
        required: false
        default: 'false'

permissions:
  contents: write

jobs:
  # ── 1. Web build + TypeScript + lint ────────────────────────────────────────
  web-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: TypeScript
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Vite build
        run: npm run build
        env:
          VITE_SUPABASE_URL:      ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

  # ── 2. Windows build ─────────────────────────────────────────────────────────
  build-windows:
    needs: web-check
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - run: npm ci

      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Set signing key (strip any line-wrap characters)
        shell: bash
        run: |
          CLEAN=$(printf '%s' "$KEY" | tr -d '[:space:]')
          echo "TAURI_SIGNING_PRIVATE_KEY=$CLEAN" >> "$GITHUB_ENV"
        env:
          KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}

      - name: Build Tauri (Windows)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN:        ${{ secrets.GITHUB_TOKEN }}
          WINDOWS_CERTIFICATE:            ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD:   ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
          VITE_SUPABASE_URL:              ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY:         ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        with:
          tagName:        ${{ github.ref_name }}
          releaseName:    'Aamodha Operations Portal ${{ github.ref_name }}'
          releaseBody:    'See CHANGELOG.md for release notes.'
          releaseDraft:   ${{ github.ref_type != 'tag' }}
          prerelease:     false
          includeRelease: true
          tauriScript:    npx tauri

  # ── 3. macOS build (universal: Intel + Apple Silicon) ────────────────────────
  build-macos:
    needs: web-check
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust (stable + both Apple targets)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - run: npm ci

      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Import Apple code-signing certificate
        if: ${{ env.APPLE_CERTIFICATE != '' }}
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.APPLE_CERTIFICATE }}
          p12-password:    ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}

      - name: Set signing key (strip any line-wrap characters)
        shell: bash
        run: |
          CLEAN=$(printf '%s' "$KEY" | tr -d '[:space:]')
          echo "TAURI_SIGNING_PRIVATE_KEY=$CLEAN" >> "$GITHUB_ENV"
        env:
          KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}

      - name: Build Tauri (macOS universal)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN:           ${{ secrets.GITHUB_TOKEN }}
          APPLE_SIGNING_IDENTITY: "-"
          APPLE_CERTIFICATE:              ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD:     ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_ID:                       ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD:                 ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID:                  ${{ secrets.APPLE_TEAM_ID }}
          VITE_SUPABASE_URL:              ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY:         ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        with:
          tagName:        ${{ github.ref_name }}
          releaseName:    'Aamodha Operations Portal ${{ github.ref_name }}'
          releaseBody:    'See CHANGELOG.md for release notes.'
          releaseDraft:   ${{ github.ref_type != 'tag' }}
          prerelease:     false
          includeRelease: true
          tauriScript:    npx tauri
          args:           '--target universal-apple-darwin'
