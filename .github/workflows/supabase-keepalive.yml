# Hit Supabase directly twice a week so the free-tier project does not go inactive.
# Requires repo variables or secrets:
#   - SUPABASE_URL       (e.g. https://your-project-ref.supabase.co)
#   - SUPABASE_ANON_KEY  (anon public key)
name: Supabase keep-alive

on:
  schedule:
    # 09:00 UTC on Monday and Thursday (twice a week, well under free limits)
    - cron: '0 9 * * 1,4'
  workflow_dispatch: # Allow manual run from Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase ping() RPC via REST
        env:
          SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          if [ -z "$SUPABASE_URL" ]; then
            echo "SUPABASE_URL not set. Add it in Settings > Secrets and variables > Actions > Variables."
            exit 1
          fi
          if [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "SUPABASE_ANON_KEY not set. Add it in Settings > Secrets and variables > Actions > Secrets."
            exit 1
          fi

          URL="$SUPABASE_URL/rest/v1/rpc/ping"
          echo "Calling $URL ..."

          res=$(curl -s -w "\n%{http_code}" \
            -H "apikey: $SUPABASE_ANON_KEY" \
            -H "Authorization: Bearer $SUPABASE_ANON_KEY" \
            -H "Content-Type: application/json" \
            -d '{}' \
            "$URL")

          body=$(echo "$res" | head -n -1)
          code=$(echo "$res" | tail -n 1)

          echo "Response ($code): $body"

          if [ "$code" != "200" ]; then
            echo "Unexpected status $code"
            exit 1
          fi

          echo "Supabase keep-alive ping succeeded."
