<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Viewport: prevent user scaling to feel native on Android -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- App identity -->
    <title>Aamodha Operations Portal</title>
    <meta name="description" content="Business operations portal for sales, orders, factory, and receivables management." />
    <meta name="application-name" content="Aamodha" />
    <meta name="author" content="Aamodha" />

    <!-- PWA / Android theme colour — colours the browser chrome on Android Chrome/WebView.
         Firefox does not support this tag (by design); that warning is expected and safe. -->
    <meta name="theme-color" content="#1e40af" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- iOS / Safari PWA meta (ensures consistent behaviour across devices) -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Aamodha" />

    <!-- PWA manifest (.webmanifest = spec-correct MIME: application/manifest+json) -->
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />

    <!-- Apple touch icons (iOS home-screen / Safari) -->
    <link rel="apple-touch-icon" sizes="192x192" href="/icons/icon-192x192.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="/icons/icon-512x512.png" />

    <!-- Open Graph -->
    <meta property="og:title" content="Aamodha Operations Portal" />
    <meta property="og:description" content="Business operations portal for sales, orders, factory, and receivables management." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/icons/icon-512x512.png" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Aamodha Operations Portal" />
    <meta name="twitter:image" content="/icons/icon-192x192.png" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
